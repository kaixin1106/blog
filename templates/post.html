{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}

<link rel="stylesheet" href="markdown.css">

<div class="markdown-body">
	<h1>{{ post.title }}</h1>
	<div class="date">{{ post.date }}</div>
	<div class="content">   
        {{ post.content|safe }}
    </div>
</div>
<p><a href="/">← 返回首页</a></p>

{% endblock %}
